services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      - tideways-daemon
    environment:
      # Set TIDEWAYS_APIKEY as a GitHub Codespaces secret (Settings > Secrets > Codespaces)
      # or in a local .devcontainer/.env file (gitignored)
      TIDEWAYS_APIKEY: ${TIDEWAYS_APIKEY:-}
    ports:
      - 80:80

  tideways-daemon:
    image: ghcr.io/tideways/daemon
    restart: unless-stopped

  db:
    image: mariadb:11.4
    restart: unless-stopped
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress

volumes:
  mariadb-data:
